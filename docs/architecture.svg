<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="450" viewBox="0 0 1000 450">
  <defs>
    <style>
      .m { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; font-size: 11px; }
      .s { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; font-size: 12px; }
    </style>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L0,7 L7,3.5 z" fill="#87867F"/>
    </marker>
  </defs>

  <rect width="1000" height="450" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" class="s" fill="#141413" font-size="16px" font-weight="500">Architecture Components</text>

  <!-- Receiver Service -->
  <rect x="50" y="70" width="250" height="150" rx="10" fill="#E3DACC" stroke="#141413" stroke-width="1"/>
  <text x="175" y="100" text-anchor="middle" class="m" fill="#141413">⚙️ Receiver Pod</text>
  <text x="175" y="120" text-anchor="middle" class="s" fill="#87867F">FastAPI · Webhook receiver</text>

  <rect x="70" y="140" width="210" height="30" rx="10" fill="#F0EEE6" stroke="#3D3D3A" stroke-width="1"/>
  <text x="175" y="160" text-anchor="middle" class="m" fill="#3D3D3A">🌐 Webhook endpoints</text>

  <rect x="70" y="185" width="210" height="25" rx="10" fill="#F0EEE6" stroke="#3D3D3A" stroke-width="1"/>
  <text x="175" y="202" text-anchor="middle" class="s" fill="#3D3D3A">Kubernetes API client</text>

  <!-- Agent Pod -->
  <rect x="350" y="70" width="300" height="350" rx="10" fill="#D97757" stroke="#141413" stroke-width="1"/>
  <text x="500" y="100" text-anchor="middle" class="m" fill="#FAF9F5">🤖 Agent Pod</text>

  <!-- Core Components -->
  <rect x="370" y="130" width="260" height="100" rx="10" fill="#FAF9F5" stroke="#141413" stroke-width="1"/>
  <text x="500" y="155" text-anchor="middle" class="s" fill="#141413">Core Components</text>

  <rect x="390" y="170" width="70" height="40" rx="10" fill="#F0EEE6" stroke="#3D3D3A" stroke-width="1"/>
  <text x="425" y="195" text-anchor="middle" class="m" fill="#3D3D3A">Claude</text>

  <rect x="480" y="170" width="70" height="40" rx="10" fill="#F0EEE6" stroke="#3D3D3A" stroke-width="1"/>
  <text x="515" y="195" text-anchor="middle" class="m" fill="#3D3D3A">State</text>

  <rect x="570" y="170" width="50" height="40" rx="10" fill="#F0EEE6" stroke="#3D3D3A" stroke-width="1"/>
  <text x="595" y="195" text-anchor="middle" class="m" fill="#3D3D3A">Git</text>

  <!-- Tools List -->
  <rect x="370" y="250" width="260" height="80" rx="10" fill="#FAF9F5" stroke="#141413" stroke-width="1"/>
  <text x="500" y="275" text-anchor="middle" class="s" fill="#141413">Agent Tools</text>
  <text x="390" y="295" class="s" fill="#87867F" font-size="11px">Read • Write • Edit • Bash</text>
  <text x="390" y="310" class="s" fill="#87867F" font-size="11px">GitHub • WebSearch • WebFetch</text>

  <!-- Git Operations -->
  <rect x="370" y="345" width="260" height="60" rx="10" fill="#FAF9F5" stroke="#141413" stroke-width="1"/>
  <text x="500" y="370" text-anchor="middle" class="s" fill="#141413">Git Operations</text>

  <rect x="390" y="385" width="60" height="15" rx="10" fill="#788C5D" stroke="#141413" stroke-width="1"/>
  <text x="420" y="396" text-anchor="middle" class="m" fill="#FAF9F5" font-size="10px">Commit</text>

  <rect x="460" y="385" width="50" height="15" rx="10" fill="#788C5D" stroke="#141413" stroke-width="1"/>
  <text x="485" y="396" text-anchor="middle" class="m" fill="#FAF9F5" font-size="10px">Push</text>

  <rect x="520" y="385" width="70" height="15" rx="10" fill="#788C5D" stroke="#141413" stroke-width="1"/>
  <text x="555" y="396" text-anchor="middle" class="m" fill="#FAF9F5" font-size="10px">Create PR</text>

  <!-- State Backend -->
  <rect x="700" y="70" width="250" height="180" rx="10" fill="#87867F" stroke="#141413" stroke-width="1"/>
  <text x="825" y="100" text-anchor="middle" class="m" fill="#FAF9F5">💾 State Backend</text>

  <rect x="720" y="130" width="70" height="50" rx="10" fill="#F0EEE6" stroke="#3D3D3A" stroke-width="1"/>
  <text x="755" y="155" text-anchor="middle" class="m" fill="#3D3D3A">🏃 Iso</text>
  <text x="755" y="170" text-anchor="middle" class="s" fill="#87867F" font-size="10px">In-memory</text>

  <rect x="810" y="130" width="70" height="50" rx="10" fill="#F0EEE6" stroke="#3D3D3A" stroke-width="1"/>
  <text x="845" y="155" text-anchor="middle" class="m" fill="#3D3D3A">🔄 Shared</text>
  <text x="845" y="170" text-anchor="middle" class="s" fill="#87867F" font-size="10px">PVC + cache</text>

  <rect x="720" y="195" width="70" height="50" rx="10" fill="#F0EEE6" stroke="#3D3D3A" stroke-width="1"/>
  <text x="755" y="220" text-anchor="middle" class="m" fill="#3D3D3A">🗄️ DB</text>
  <text x="755" y="235" text-anchor="middle" class="s" fill="#87867F" font-size="10px">PostgreSQL</text>

  <!-- Kubernetes -->
  <rect x="50" y="250" width="250" height="120" rx="10" fill="#788C5D" stroke="#141413" stroke-width="1"/>
  <text x="175" y="280" text-anchor="middle" class="m" fill="#FAF9F5">☸️ Kubernetes</text>

  <rect x="70" y="300" width="210" height="25" rx="10" fill="#FAF9F5" stroke="#141413" stroke-width="1"/>
  <text x="175" y="317" text-anchor="middle" class="s" fill="#788C5D">API server + CRD storage</text>

  <rect x="70" y="335" width="100" height="25" rx="10" fill="#E3DACC" stroke="#141413" stroke-width="1"/>
  <text x="120" y="352" text-anchor="middle" class="s" fill="#141413">🔵 Sandbox Op</text>

  <!-- External Triggers -->
  <rect x="700" y="280" width="250" height="80" rx="10" fill="#E3DACC" stroke="#141413" stroke-width="1"/>
  <text x="825" y="305" text-anchor="middle" class="m" fill="#141413">🌐 Triggers</text>

  <rect x="720" y="325" width="90" height="25" rx="10" fill="#F0EEE6" stroke="#3D3D3A" stroke-width="1"/>
  <text x="765" y="342" text-anchor="middle" class="s" fill="#3D3D3A">📝 GitHub</text>

  <rect x="830" y="325" width="90" height="25" rx="10" fill="#F0EEE6" stroke="#3D3D3A" stroke-width="1"/>
  <text x="875" y="342" text-anchor="middle" class="s" fill="#3D3D3A">🔔 Webhook</text>

  <!-- Arrows -->
  <line x1="300" y1="145" x2="350" y2="145" stroke="#87867F" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="650" y1="145" x2="700" y2="145" stroke="#87867F" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Dashed arrow to state -->
  <path d="M 500 420 L 500 440 L 825 440 L 825 250" fill="none" stroke="#87867F" stroke-width="1" stroke-dasharray="4 4" marker-end="url(#arrow)"/>
  <text x="660" y="435" text-anchor="middle" class="s" fill="#87867F">read/write</text>

  <!-- Footer -->
  <text x="500" y="480" text-anchor="middle" class="s" fill="#87867F">All components run in Kubernetes with configurable state persistence</text>
</svg>