<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="700" viewBox="0 0 1000 700">
  <defs>
    <style>
      .m { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; font-size: 11px; }
      .s { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; font-size: 12px; }
      .sub { font-size: 10px; fill: #87867F; }
      .lbl { font-size: 10px; fill: #87867F; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#87867F"/>
    </marker>
    <marker id="arrow-rust" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#B04A3F"/>
    </marker>
    <marker id="arrow-olive" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#788C5D"/>
    </marker>
  </defs>

  <rect width="1000" height="700" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" class="s" fill="#141413" font-size="16px" font-weight="500">Agent Runner Flow</text>

  <!-- Start: GitHub Trigger -->
  <g class="node term">
    <rect x="60" y="70" width="160" height="50" rx="22" fill="#F0EEE6" stroke="#3D3D3A" stroke-width="1"/>
    <text x="140" y="92" text-anchor="middle" class="m" fill="#3D3D3A">📝 GitHub</text>
    <text x="140" y="107" text-anchor="middle" class="sub" fill="#87867F">/fix comment</text>
  </g>

  <!-- Edge: webhook -->
  <line class="edge" x1="220" y1="95" x2="270" y2="95" stroke="#87867F" stroke-width="1" marker-end="url(#arrow)"/>
  <text class="lbl" x="245" y="85" text-anchor="middle">webhook</text>

  <!-- Receiver Pod (long-running) -->
  <g class="node">
    <rect x="270" y="70" width="180" height="50" rx="8" fill="#fff" stroke="#D97757" stroke-width="1"/>
    <text x="360" y="92" text-anchor="middle" class="m" fill="#D97757">∞ Receiver Pod</text>
    <text x="360" y="107" text-anchor="middle" class="sub" fill="#87867F">FastAPI · long-running</text>
  </g>

  <!-- Edge: verify -->
  <line class="edge" x1="450" y1="95" x2="500" y2="95" stroke="#87867F" stroke-width="1" marker-end="url(#arrow)"/>
  <text class="lbl" x="475" y="85" text-anchor="middle">HMAC</text>

  <!-- Decision: HMAC valid? -->
  <g class="node gate">
    <path d="M500,70 L540,95 L500,120 L460,95 Z" fill="#fff" stroke="#3D3D3A" stroke-width="1"/>
    <text x="500" y="99" text-anchor="middle" class="m" fill="#3D3D3A">valid?</text>
  </g>

  <!-- Edge: no -> reject -->
  <path class="edge no" d="M460,95 L380,95 L380,150" fill="none" stroke="#B04A3F" stroke-width="1" stroke-dasharray="4 4" marker-end="url(#arrow-rust)"/>
  <text class="lbl" x="390" y="115" fill="#B04A3F">no</text>

  <!-- Reject (error response) -->
  <g class="node bad">
    <rect x="300" y="150" width="160" height="40" rx="8" fill="rgba(176,74,63,0.10)" stroke="#B04A3F" stroke-width="1"/>
    <text x="380" y="175" text-anchor="middle" class="s" fill="#B04A3F">Return 401</text>
  </g>

  <!-- Edge: yes -> create CR -->
  <path class="edge yes" d="M540,95 L620,95" fill="none" stroke="#788C5D" stroke-width="1" marker-end="url(#arrow-olive)"/>
  <text class="lbl" x="570" y="85" fill="#788C5D">yes</text>

  <!-- Create CR -->
  <g class="node">
    <rect x="620" y="70" width="160" height="50" rx="8" fill="#fff" stroke="#3D3D3A" stroke-width="1"/>
    <text x="700" y="92" text-anchor="middle" class="m" fill="#3D3D3A">K8s API</text>
    <text x="700" y="107" text-anchor="middle" class="sub" fill="#87867F">Create Sandbox CR</text>
  </g>

  <!-- Edge: CR created -> operator watches -->
  <path class="edge" d="M700,120 L700,160" fill="none" stroke="#87867F" stroke-width="1" stroke-dasharray="4 4" marker-end="url(#arrow)"/>
  <text class="lbl" x="710" y="145" fill="#87867F">CR created</text>

  <!-- Operator (long-running watcher) -->
  <g class="node">
    <rect x="620" y="160" width="160" height="50" rx="8" fill="#fff" stroke="#788C5D" stroke-width="1"/>
    <text x="700" y="182" text-anchor="middle" class="m" fill="#788C5D">👁️ Operator</text>
    <text x="700" y="197" text-anchor="middle" class="sub" fill="#87867F">Watches CRs</text>
  </g>

  <!-- Edge: spawn agent -->
  <path class="edge yes" d="M700,210 L700,250" fill="none" stroke="#788C5D" stroke-width="1" marker-end="url(#arrow-olive)"/>
  <text class="lbl" x="710" y="235" fill="#788C5D">spawn</text>

  <!-- Agent Pod (ephemeral) -->
  <g class="node">
    <rect x="580" y="250" width="240" height="180" rx="8" fill="#fff" stroke="#D97757" stroke-width="1"/>
    <text x="700" y="272" text-anchor="middle" class="m" fill="#D97757">⏱️ Agent Pod</text>
    <text x="700" y="287" text-anchor="middle" class="sub" fill="#87867F">ephemeral · self-deletes</text>

    <!-- Agent steps -->
    <rect x="600" y="300" width="200" height="25" rx="6" fill="#F0EEE6" stroke="#3D3D3A" stroke-width="1"/>
    <text x="700" y="317" text-anchor="middle" class="sub" fill="#3D3D3A">1. Clone repository</text>

    <rect x="600" y="330" width="200" height="25" rx="6" fill="#F0EEE6" stroke="#3D3D3A" stroke-width="1"/>
    <text x="700" y="347" text-anchor="middle" class="sub" fill="#3D3D3A">2. Run Claude Agent SDK</text>

    <rect x="600" y="360" width="200" height="25" rx="6" fill="#F0EEE6" stroke="#3D3D3A" stroke-width="1"/>
    <text x="700" y="377" text-anchor="middle" class="sub" fill="#3D3D3A">3. Track state</text>

    <rect x="600" y="390" width="200" height="25" rx="6" fill="#F0EEE6" stroke="#3D3D3A" stroke-width="1"/>
    <text x="700" y="407" text-anchor="middle" class="sub" fill="#3D3D3A">4. Git operations</text>
  </g>

  <!-- Edge: agent completes -> cleanup -->
  <path class="edge" d="M700,430 L700,470" fill="none" stroke="#87867F" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Cleanup -->
  <g class="node">
    <rect x="620" y="470" width="160" height="40" rx="8" fill="#F0EEE6" stroke="#3D3D3A" stroke-width="1"/>
    <text x="700" y="495" text-anchor="middle" class="s" fill="#3D3D3A">🗑️ Delete CR</text>
  </g>

  <!-- Edge: done -->
  <path class="edge yes" d="M700,510 L700,550" fill="none" stroke="#788C5D" stroke-width="1" marker-end="url(#arrow-olive)"/>

  <!-- Success terminal -->
  <g class="node ok term">
    <rect x="620" y="550" width="160" height="44" rx="22" fill="rgba(120,140,93,0.12)" stroke="#788C5D" stroke-width="1"/>
    <text x="700" y="577" text-anchor="middle" class="m" fill="#788C5D">✅ Done</text>
  </g>

  <!-- State Backend side -->
  <g>
    <rect x="60" y="250" width="200" height="120" rx="10" fill="#87867F" stroke="#141413" stroke-width="1"/>
    <text x="160" y="275" text-anchor="middle" class="m" fill="#FAF9F5">💾 State Backend</text>

    <rect x="80" y="295" width="50" height="35" rx="8" fill="#F0EEE6" stroke="#3D3D3A" stroke-width="1"/>
    <text x="105" y="317" text-anchor="middle" class="m" fill="#3D3D3A">🏃</text>

    <rect x="140" y="295" width="50" height="35" rx="8" fill="#F0EEE6" stroke="#3D3D3A" stroke-width="1"/>
    <text x="165" y="317" text-anchor="middle" class="m" fill="#3D3D3A">🔄</text>

    <rect x="80" y="340" width="50" height="30" rx="8" fill="#FAF9F5" stroke="#141413" stroke-width="1"/>
    <text x="105" y="360" text-anchor="middle" class="sub" fill="#141413">🗄️ DB</text>

    <!-- Connection to agent -->
    <path d="M 260 310 L 580 310" fill="none" stroke="#87867F" stroke-width="1" stroke-dasharray="4 4" marker-end="url(#arrow)"/>
    <text class="lbl" x="420" y="300" text-anchor="middle">read/write</text>
  </g>

  <!-- Legend -->
  <g>
    <rect x="60" y="420" width="200" height="100" rx="8" fill="#FAF9F5" stroke="#141413" stroke-width="1"/>
    <text x="160" y="440" text-anchor="middle" class="s" fill="#141413">Legend</text>

    <rect x="80" y="455" width="20" height="14" rx="3" fill="#fff" stroke="#3D3D3A" stroke-width="1"/>
    <text x="110" y="467" class="sub" fill="#3D3D3A">process</text>

    <path d="M80,485 L90,490 L80,495 L70,490 Z" fill="#fff" stroke="#3D3D3A" stroke-width="1"/>
    <text x="110" y="492" class="sub" fill="#3D3D3A">decision</text>

    <rect x="80" y="505" width="20" height="14" rx="7" fill="rgba(120,140,93,0.12)" stroke="#788C5D" stroke-width="1"/>
    <text x="110" y="517" class="sub" fill="#3D3D3A">success</text>
  </g>

  <!-- Lifecycle notes -->
  <g>
    <text x="140" y="650" class="sub" fill="#87867F">∞ = long-running service</text>
    <text x="140" y="665" class="sub" fill="#87867F">⏱️ = ephemeral pod (dies when done)</text>
    <text x="140" y="680" class="sub" fill="#87867F">👁️ = watcher (observes CRs)</text>
  </g>
</svg>